name: Hoop Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ">=1.26.0"
      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Test
        run: make test

  build-rust-binaries-darwin:
    runs-on: macos-latest
    name: Build Darwin Rust Binaries
    environment: production
    needs: [test]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Add Darwin Rust targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build Darwin Rust Binaries
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: make build-rust-darwin-all

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  build-rust-binary-linux-amd64:
    runs-on: ubuntu-latest
    name: Build Linux Rust Binaries Amd64
    environment: production
    needs: [test]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Add Linux Rust targets
        run: |
          rustup target add x86_64-unknown-linux-gnu

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build Linux Rust Binaries
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=linux GOARCH=amd64 make build-rust-single

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  build-rust-binary-linux-arm64:
    runs-on: ubuntu-24.04-arm
    name: Build Linux Rust Binaries Arm64
    environment: production
    needs: [test]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Add Linux Rust targets
        run: |
          rustup target add aarch64-unknown-linux-gnu

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build Linux Rust Binaries
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=linux GOARCH=arm64 make build-rust-single

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  darwin-amd64:
    runs-on: ubuntu-latest
    name: Build Darwin Amd64
    environment: production
    needs: [test, build-webapp]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache-dependency-path: "**/go.sum"

      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate WASM
        run: make generate-wasm

      - name: Download Webapp
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts-build-webapp
          path: dist/

      - name: Embed Webapp
        run: make embed-webapp

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: amd64
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=darwin GOARCH=amd64 make build-go

      - name: Build hsh-tunneld (darwin/amd64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=darwin GOARCH=amd64 make build-hsh-tunneld

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  darwin-arm64:
    runs-on: ubuntu-latest
    name: Build Darwin Arm64
    environment: production
    needs: [test, build-webapp]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache-dependency-path: "**/go.sum"

      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate WASM
        run: make generate-wasm

      - name: Download Webapp
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts-build-webapp
          path: dist/

      - name: Embed Webapp
        run: make embed-webapp

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=darwin GOARCH=arm64 make build-go

      - name: Build hsh-tunneld (darwin/arm64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=darwin GOARCH=arm64 make build-hsh-tunneld

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  windows-amd64:
    runs-on: ubuntu-latest
    name: Build Windows Amd64
    environment: production
    needs: [test, build-webapp]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache-dependency-path: "**/go.sum"

      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate WASM
        run: make generate-wasm

      - name: Download Webapp
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts-build-webapp
          path: dist/

      - name: Embed Webapp
        run: make embed-webapp

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=windows GOARCH=amd64 make build-go

      - name: Build hsh-tunneld (windows/amd64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=windows GOARCH=amd64 make build-hsh-tunneld

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  windows-arm64:
    runs-on: ubuntu-latest
    name: Build Windows Arm64
    environment: production
    needs: [test, build-webapp]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache-dependency-path: "**/go.sum"

      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate WASM
        run: make generate-wasm

      - name: Download Webapp
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts-build-webapp
          path: dist/

      - name: Embed Webapp
        run: make embed-webapp

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=windows GOARCH=arm64 make build-go

      - name: Build hsh-tunneld (windows/arm64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: GOOS=windows GOARCH=arm64 make build-hsh-tunneld

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  linux-amd64:
    runs-on: ubuntu-latest
    name: Build Linux Amd64
    environment: production
    needs: [test, build-webapp]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache-dependency-path: "**/go.sum"

      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate WASM
        run: make generate-wasm

      - name: Download Webapp
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts-build-webapp
          path: dist/

      - name: Embed Webapp
        run: make embed-webapp

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SEGMENT_API_KEY: ${{ secrets.SEGMENT_API_KEY }}
          INTERCOM_HMAC_KEY: ${{ secrets.INTERCOM_HMAC_KEY }}
        run: GOOS=linux GOARCH=amd64 make build-go

      - name: Build hsh-tunneld (linux/amd64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SEGMENT_API_KEY: ${{ secrets.SEGMENT_API_KEY }}
          INTERCOM_HMAC_KEY: ${{ secrets.INTERCOM_HMAC_KEY }}
        run: GOOS=linux GOARCH=amd64 make build-hsh-tunneld

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  linux-arm64:
    runs-on: ubuntu-latest
    name: Build Linux Arm64
    environment: production
    needs: [test, build-webapp]

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Checkout libhoop
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.0"
          cache-dependency-path: "**/go.sum"

      - name: Setup Rust for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Generate WASM
        run: make generate-wasm

      - name: Download Webapp
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts-build-webapp
          path: dist/

      - name: Embed Webapp
        run: make embed-webapp

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SEGMENT_API_KEY: ${{ secrets.SEGMENT_API_KEY }}
          INTERCOM_HMAC_KEY: ${{ secrets.INTERCOM_HMAC_KEY }}
        run: GOOS=linux GOARCH=arm64 make build-go

      - name: Build hsh-tunneld (linux/arm64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SEGMENT_API_KEY: ${{ secrets.SEGMENT_API_KEY }}
          INTERCOM_HMAC_KEY: ${{ secrets.INTERCOM_HMAC_KEY }}
        run: GOOS=linux GOARCH=arm64 make build-hsh-tunneld

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  build-webapp:
    runs-on: ubuntu-latest
    name: Build Webapp
    environment: production
    needs: [test]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 1.12.0.1479 # releases: https://clojure.org/releases/tools
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json
      - name: Build
        run: make build-webapp
      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  build-tar-files:
    runs-on: ubuntu-latest
    name: Build Tar Files
    environment: production
    needs:
      - test
      - darwin-amd64
      - darwin-arm64
      - windows-amd64
      - windows-arm64
      - linux-amd64
      - linux-arm64
      - build-webapp
      - build-rust-binaries-darwin
      - build-rust-binary-linux-amd64
      - build-rust-binary-linux-arm64
    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-archive: true
          path: dist/

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Merge Artifacts into dist/
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: make merge-artifacts

      - name: Build Tar Files for All Architectures
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: |
          GOOS=darwin GOARCH=amd64 make build-tar-files
          GOOS=darwin GOARCH=arm64 make build-tar-files
          GOOS=windows GOARCH=amd64 make build-tar-files
          GOOS=windows GOARCH=arm64 make build-tar-files
          GOOS=linux GOARCH=amd64 make build-tar-files
          GOOS=linux GOARCH=arm64 make build-tar-files

      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts-${{ github.job }}
          path: dist/

  docker-publish-hoopgateway-arm64:
    runs-on: GitHub-Linux-Arm-Runner
    name: Dck Publish Gateway (arm64)
    environment: production
    needs:
      - build-tar-files
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: hoophq/hoop
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/
      - name: Extract Webapp
        run: make extract-webapp
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile
          context: '.'
          platforms: linux/arm64
          provenance: false
          sbom: false
          push: true
          tags: |
            hoophq/hoop:${{ github.sha }}-arm64

  docker-publish-hoopgateway-amd64:
    runs-on: ubuntu-latest
    name: Dck Publish Gateway (amd64)
    environment: production
    needs:
      - build-tar-files
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: hoophq/hoop
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/
      - name: Extract Webapp
        run: make extract-webapp
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile
          context: '.'
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: |
            hoophq/hoop:${{ github.sha }}-amd64

  docker-publish-hoopgateway-multiarch:
    runs-on: ubuntu-latest
    name: Publish Gateway Image
    environment: production
    needs:
      - docker-publish-hoopgateway-amd64
      - docker-publish-hoopgateway-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: hoophq/hoop
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Create SHA manifest and push
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: |
          docker manifest create hoophq/hoop:${{ env.GIT_TAG }} \
            --amend hoophq/hoop:${{ github.sha }}-amd64 \
            --amend hoophq/hoop:${{ github.sha }}-arm64
          docker manifest create hoophq/hoop:latest \
            --amend hoophq/hoop:${{ github.sha }}-amd64 \
            --amend hoophq/hoop:${{ github.sha }}-arm64
          docker manifest push hoophq/hoop:${{ env.GIT_TAG }}
          docker manifest push hoophq/hoop:latest

  # Agent image with a bundled OCR engine for the realtime RDP PII guard
  # (see Dockerfile.agent-ocr). Built FROM the just-published hoop image, so
  # it depends on the gateway multiarch publish. CPU flavor is multiarch;
  # the GPU flavor (-gpu tag) is amd64-only (CUDA).
  docker-publish-hoopagent-ocr:
    runs-on: ubuntu-latest
    name: Publish Agent OCR Image (CPU)
    environment: production
    needs:
      - docker-publish-hoopgateway-multiarch
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Build and push (CPU, multiarch)
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile.agent-ocr
          context: '.'
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          push: true
          build-args: |
            HOOP_IMAGE=hoophq/hoop:${{ env.GIT_TAG }}
          tags: |
            hoophq/hoop-agent-ocr:${{ env.GIT_TAG }}
            hoophq/hoop-agent-ocr:latest

  docker-publish-hoopagent-ocr-gpu:
    runs-on: ubuntu-latest
    name: Publish Agent OCR Image (GPU)
    environment: production
    needs:
      - docker-publish-hoopgateway-multiarch
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Build and push (GPU, amd64-only)
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile.agent-ocr-gpu
          context: '.'
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          build-args: |
            HOOP_IMAGE=hoophq/hoop:${{ env.GIT_TAG }}
          tags: |
            hoophq/hoop-agent-ocr:${{ env.GIT_TAG }}-gpu


  docker-publish-hoopagent-arm64:
    runs-on: GitHub-Linux-Arm-Runner
    name: Dck Publish Agent (arm64)
    environment: production
    needs:
      - build-tar-files
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: hoophq/hoopdev
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile.dev
          context: '.'
          platforms: linux/arm64
          provenance: false
          sbom: false
          push: true
          tags: |
            hoophq/hoopdev:${{ github.sha }}-arm64

  docker-publish-hoopagent-amd64:
    runs-on: ubuntu-latest
    name: Dck Publish Agent (amd64)
    environment: production
    needs:
      - build-tar-files
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: hoophq/hoopdev
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile.dev
          context: '.'
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: |
            hoophq/hoopdev:${{ github.sha }}-amd64

  docker-publish-hoopagent-multiarch:
    runs-on: ubuntu-latest
    name: Publish Hoopagent Image
    environment: production
    needs:
      - docker-publish-hoopagent-amd64
      - docker-publish-hoopagent-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: hoophq/hoopdev
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Create SHA manifest and push
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: |
          docker manifest create hoophq/hoopdev:${{ env.GIT_TAG }} \
            --amend hoophq/hoopdev:${{ github.sha }}-amd64 \
            --amend hoophq/hoopdev:${{ github.sha }}-arm64
          docker manifest create hoophq/hoopdev:latest \
            --amend hoophq/hoopdev:${{ github.sha }}-amd64 \
            --amend hoophq/hoopdev:${{ github.sha }}-arm64
          docker manifest push hoophq/hoopdev:${{ env.GIT_TAG }}
          docker manifest push hoophq/hoopdev:latest

  # --- Clean image line (DEP-66): hoophq/hoop-ng + hoophq/hoopdev-ng ----------
  # Bright-line, clean-only repos (no dirty history) that the hoop-ng helm chart
  # points at. Every job here is continue-on-error and NOT a dependency of
  # publish-release: a hiccup, or a clean base that isn't published yet, must
  # never fail the release workflow (which would also block auto-deploy). The
  # authoritative AGPL/SSPL gating lives in agent-tools-build.yml.
  docker-publish-hoop-ng:
    runs-on: ubuntu-latest
    name: Publish clean gateway (hoop-ng)
    environment: production
    needs:
      - docker-publish-hoopgateway-multiarch
    continue-on-error: true
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Mirror gateway to clean-only hoop-ng repo
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: |
          # hoophq/hoop is already AGPL/SSPL-clean; copy its multiarch manifest
          # verbatim (no rebuild) into the bright-line clean-only repo. Retry to
          # ride out registry eventual consistency right after the source push,
          # and skip (not fail) if the source never becomes visible.
          src="hoophq/hoop:${GIT_TAG}"
          ok=""
          for i in 1 2 3 4 5; do
            if docker manifest inspect "$src" >/dev/null 2>&1; then ok=1; break; fi
            echo "waiting for $src to be visible ($i/5)"; sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::warning::$src not visible; skipping hoop-ng mirror"; exit 0
          fi
          docker buildx imagetools create -t "hoophq/hoop-ng:${GIT_TAG}" "$src"
          docker buildx imagetools create -t hoophq/hoop-ng:latest "$src"

  docker-publish-hoopdev-ng-arm64:
    runs-on: GitHub-Linux-Arm-Runner
    name: Publish clean agent hoopdev-ng (arm64)
    environment: production
    needs:
      - build-tar-files
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/
      - name: Resolve clean base and check availability
        id: base
        run: |
          base="$(awk -F= '/^ARG[[:space:]]+AGENT_TOOLS_TAG=/{print $2; exit}' Dockerfile.dev)"
          if [ -z "$base" ]; then
            echo "::warning::could not resolve AGENT_TOOLS_TAG from Dockerfile.dev; skipping hoopdev-ng (arm64)"
            echo "exists=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          clean_base="${base}-clean"
          echo "tag=${clean_base}" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "hoophq/agent-tools:${clean_base}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::clean base hoophq/agent-tools:${clean_base} not published yet; skipping hoopdev-ng (arm64)"
          fi
      - name: Build and push
        if: steps.base.outputs.exists == 'true'
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile.dev
          context: '.'
          platforms: linux/arm64
          provenance: false
          sbom: false
          push: true
          build-args: |
            AGENT_TOOLS_TAG=${{ steps.base.outputs.tag }}
          tags: |
            hoophq/hoopdev-ng:${{ github.sha }}-arm64

  docker-publish-hoopdev-ng-amd64:
    runs-on: ubuntu-latest
    name: Publish clean agent hoopdev-ng (amd64)
    environment: production
    needs:
      - build-tar-files
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/
      - name: Resolve clean base and check availability
        id: base
        run: |
          base="$(awk -F= '/^ARG[[:space:]]+AGENT_TOOLS_TAG=/{print $2; exit}' Dockerfile.dev)"
          if [ -z "$base" ]; then
            echo "::warning::could not resolve AGENT_TOOLS_TAG from Dockerfile.dev; skipping hoopdev-ng (amd64)"
            echo "exists=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          clean_base="${base}-clean"
          echo "tag=${clean_base}" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "hoophq/agent-tools:${clean_base}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::clean base hoophq/agent-tools:${clean_base} not published yet; skipping hoopdev-ng (amd64)"
          fi
      - name: Build and push
        if: steps.base.outputs.exists == 'true'
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile.dev
          context: '.'
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          build-args: |
            AGENT_TOOLS_TAG=${{ steps.base.outputs.tag }}
          tags: |
            hoophq/hoopdev-ng:${{ github.sha }}-amd64

  docker-publish-hoopdev-ng-multiarch:
    runs-on: ubuntu-latest
    name: Publish clean agent hoopdev-ng (manifest)
    environment: production
    needs:
      - docker-publish-hoopdev-ng-amd64
      - docker-publish-hoopdev-ng-arm64
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Check clean per-arch images availability
        id: imgs
        run: |
          # Gate on the per-arch images actually existing, not on the base:
          # the build jobs are continue-on-error, so one arch may be missing.
          ready=true
          for arch in amd64 arm64; do
            if ! docker manifest inspect "hoophq/hoopdev-ng:${{ github.sha }}-${arch}" >/dev/null 2>&1; then
              echo "::warning::missing hoophq/hoopdev-ng:${{ github.sha }}-${arch}; skipping hoopdev-ng manifest"
              ready=false
            fi
          done
          echo "ready=${ready}" >> "$GITHUB_OUTPUT"
      - name: Create manifest and push
        if: steps.imgs.outputs.ready == 'true'
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
        run: |
          docker manifest create hoophq/hoopdev-ng:${GIT_TAG} \
            --amend hoophq/hoopdev-ng:${{ github.sha }}-amd64 \
            --amend hoophq/hoopdev-ng:${{ github.sha }}-arm64
          docker manifest create hoophq/hoopdev-ng:latest \
            --amend hoophq/hoopdev-ng:${{ github.sha }}-amd64 \
            --amend hoophq/hoopdev-ng:${{ github.sha }}-arm64
          docker manifest push hoophq/hoopdev-ng:${GIT_TAG}
          docker manifest push hoophq/hoopdev-ng:latest

  publish-release:
    runs-on: ubuntu-latest
    name: Publish Release
    environment: production
    needs:
      - docker-publish-hoopgateway-multiarch
      - docker-publish-hoopagent-multiarch
    permissions:
      # gh release create / upload needs write access. The job already
      # uses secrets.GH_TOKEN (a PAT) for cross-repo work; this permission
      # block belt-and-suspenders the default GITHUB_TOKEN for any step
      # that prefers it.
      contents: write

    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        id: download
        with:
          pattern: dist-artifacts-*
          merge-multiple: true
          path: dist/

      - uses: matbour/setup-sentry-cli@v2
        id: sentry-cli

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Build Gateway Bundle (amd64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          GOARCH: amd64
        run: make build-gateway-bundle

      - name: Build Gateway Bundle (arm64)
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          GOARCH: arm64
        run: make build-gateway-bundle

      - name: Build Helm Chart
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          GITHUB_CONTAINER_REGISTRY_TOKEN: ${{ secrets.GH_CONTAINER_REGISTRY_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
        run: make build-helm-chart

      - name: Publish Release
        env:
          GIT_TAG: ${{ env.GIT_TAG }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |-
          make release-s3
          make release-s3-latest
          make release-s3-cf-templates-latest

      # Create a GitHub Release with the hsh-tunneld binaries for all 6 targets.
      #
      # The release is consumed by the hoophq/hsh repo's build pipeline, which
      # downloads the matching hsh-tunneld binary per target and bundles it
      # alongside the bun-compiled `hsh` CLI. SHA256SUMS lets the hsh build
      # verify integrity.
      #
      # Idempotency: if a release already exists for this tag (e.g. workflow
      # re-run), upload the assets to it instead of failing the run.
      - name: Publish GitHub Release (hsh-tunneld)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_TAG: ${{ env.GIT_TAG }}
        run: |-
          make build-release-checksums
          # Sanity-check: 6 binaries + 2 scripts + SHA256SUMS == 9 files.
          ls -lh dist/release-binaries/
          if gh release view "$GIT_TAG" >/dev/null 2>&1; then
            echo "Release $GIT_TAG already exists; uploading assets with --clobber."
            gh release upload "$GIT_TAG" dist/release-binaries/* --clobber
          else
            # `--generate-notes` populates the release body from PRs merged
            # since the previous tag. `--latest=false` keeps Brew / S3 in
            # charge of marking the canonical latest; we just need the assets
            # available at a predictable URL.
            gh release create "$GIT_TAG" \
              --title "$GIT_TAG" \
              --generate-notes \
              --latest=false \
              dist/release-binaries/*
          fi

      - name: Publish Brew Recipe
        run: gh workflow run release.yml -f version=$GIT_TAG --repo hoophq/brew
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_TAG: ${{ env.GIT_TAG }}

      - name: Publish Sentry Sourcemaps
        run: make publish-sentry-sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Tag libhoop with release tag
        uses: actions/checkout@v3
        with:
          repository: hoophq/libhoop
          path: "./libhoop"
          token: ${{ secrets.GH_TOKEN }}
      - name: Push tag
        working-directory: ./libhoop
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          git tag "$GIT_TAG" 2>/dev/null || true
          git push origin "$GIT_TAG"

  # Create a Linear release once the version has actually shipped. This job runs
  # only after `publish-release` succeeds, so a Linear release is never created
  # for a version that failed to publish.
  #
  # The official Linear action (command defaults to `sync`) scans the commits
  # that landed since the previous release for Linear issue identifiers (e.g.
  # ENG-123) in the squash-merge subjects/bodies, creates a release named after
  # the semver tag in the configured pipeline, attaches those issues, and marks
  # it complete. fetch-depth: 0 is required so the action can walk history back
  # to the previous release commit to determine the scan range.
  #
  # Requires the `LINEAR_ACCESS_KEY` repository secret (a Linear pipeline access
  # key generated from Linear's release settings).
  publish-linear-release:
    runs-on: ubuntu-latest
    name: Publish Linear Release
    needs:
      - publish-release
    steps:
      - name: Checkout Hoop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git Tag
        run: echo "GIT_TAG=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Create Linear Release
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          version: ${{ env.GIT_TAG }}