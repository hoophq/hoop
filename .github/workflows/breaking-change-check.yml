name: API Breaking Change Check

on:
  pull_request:
    paths:
      - 'gateway/api/openapi/**'
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  breaking-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Export base spec from target branch
        run: |
          git show origin/${{ github.base_ref }}:gateway/api/openapi/openapiv3.json > base-openapiv3.json

      - uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: 'base-openapiv3.json'
          revision: 'gateway/api/openapi/openapiv3.json'
          fail-on: 'WARN'