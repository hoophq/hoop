name: hoop

services:
  db:
    image: postgres:17.6
    # Hide postgres startup chatter from `docker compose up` output; still
    # available via `docker compose logs db`. Requires Compose v2.20+.
    attach: false
    networks:
      - hoopdev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hoopdb
      PGUSER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: "2s"
      timeout: "30s"
      retries: 10
      start_period: "20s"
  gateway:
    image: hoophq/hoop
    # Allocate a TTY so the gateway's log auto-detect picks the human-readable
    # encoder in interactive `docker compose up`. Piped/CI runs still fall back
    # to JSON because `docker compose up | tee` is not a terminal.
    tty: true
    environment:
      - GIN_MODE=release
      - POSTGRES_DB_URI=postgres://postgres:postgres@db:5432/hoopdb?sslmode=disable
      - DLP_PROVIDER=mspresidio
      - DLP_MODE=best-effort
      - MSPRESIDIO_ANALYZER_URL=http://presidio-analyzer:3000
      - MSPRESIDIO_ANONYMIZER_URL=http://presidio-anonymizer:3000
    env_file: ".env"
    command: ["hoop", "start", "gateway"]
    ports:
      - "8009:8009"
      - "8010:8010"
      - "15432:15432"
      - "12222:12222"
      - "13389:13389"
    networks:
      - hoopdev
    depends_on:
      db:
        condition: "service_healthy"
    healthcheck:
      test:
      - CMD-SHELL
      - |
        PROTO=http; [ -n "$$TLS_KEY" ] && PROTO=https
        curl -k -f $$PROTO://127.0.0.1:8009/api/healthz || exit 1
      interval: "2s"
      timeout: "30s"
      retries: 10
      start_period: "20s"
  agent:
    image: hoophq/hoopdev
    # The agent is chatty at boot (hoop_rs PID, TLS auto-gen, rdp processor).
    # Gateway still logs `agent connected: name=default` when the handshake
    # completes, so detaching here does not hide the meaningful signal.
    attach: false
    networks:
      - hoopdev
    env_file: ".env"
    environment:
      - POSTGRES_DB_URI=postgres://postgres:postgres@db:5432/hoopdb?sslmode=disable
      - DEFAULT_AGENT_GRPC_SCHEME=grpc
      - DEFAULT_AGENT_GRPC_HOST=gateway:8010
      - DEFAULT_AGENT_GATEWAY_URL=ws://gateway:8009
    depends_on:
      gateway:
        condition: "service_healthy"
    command: hoop-default-agent.sh

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:2.2.360
    # Hide presidio's giant ASCII banner and recognizer load lines.
    attach: false
    networks:
      - hoopdev
    depends_on:
      gateway:
        condition: "service_healthy"

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:2.2.360
    attach: false
    networks:
      - hoopdev
    depends_on:
      gateway:
        condition: "service_healthy"

  # Waits for the gateway + agent to be ready and prints a hoop-branded
  # "you're ready" banner with the access URL. Reuses the gateway image
  # (already has bash/curl/jq) so no extra image pull.
  startup:
    image: hoophq/hoop
    networks:
      - hoopdev
    depends_on:
      gateway:
        condition: "service_healthy"
      agent:
        condition: "service_started"
    entrypoint: ["/bin/bash"]
    command: ["/usr/local/bin/hoop-startup-banner.sh"]
    restart: "no"

networks:
  hoopdev:

