{{- if .Values.spiffeBundle.jwks }}
apiVersion: v1
kind: Secret
metadata:
  name: hoop-spiffe-bundle
type: Opaque
{{- /*
  spiffeBundle.jwks may be provided as either:
    - raw JWKS JSON (multi-line) — rendered via stringData
    - base64-encoded JWKS JSON (single-line) — rendered via data, useful
      when the value is injected through a shell heredoc that cannot
      safely carry raw JSON with quotes/newlines.
  base64 is autodetected: if the value starts with '{' we treat it as
  raw JSON; otherwise we assume it's already base64.
*/ -}}
{{- $jwks := .Values.spiffeBundle.jwks | trim }}
{{- if hasPrefix "{" $jwks }}
stringData:
  bundle.jwks: |-
{{ $jwks | indent 4 }}
{{- else }}
data:
  bundle.jwks: {{ $jwks | quote }}
{{- end }}
{{- end }}
