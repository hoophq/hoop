## Default values for hoop.
## This is a YAML-formatted file.
## Declare variables to be passed into your templates.

# Refer to this guide for more details: https://hoop.dev/docs/setup/deployment/overview

# -- Define a custom image configuration
image:
  gw: {}
  #   repository: hoophq/hoop
  #   pullPolicy: Always
  #   tag: latest

# -- Enable the default agent (authenticates to the gateway via HOOP_KEY / DSN)
defaultAgent:
  enabled: false
  imageRepository: 'hoophq/hoopdev'
  imageTag: latest
  imagePullPolicy: Always
  grpcScheme: grpc
  grpcHost: 127.0.0.1:8010
  # 'base64://<base64-encoded-ca-cert>'
  # 'file:///path/to/ca-cert.pem'
  grpcTlsCa: ''
  grpcSkipVerify: false

# -- Enable a second sidecar agent authenticated via SPIFFE JWT-SVID.
# Runs alongside defaultAgent without replacing it: the agent container
# reads HOOP_KEY_FILE=/run/spiffe/agent.jwt, and a spiffe-helper sidecar
# writes/rotates that file by talking to the node-local SPIRE agent over
# the SPIFFE CSI volume.
# Requires the SPIFFE CSI Driver (csi.spiffe.io) and a SPIRE agent
# DaemonSet reachable from the node. A private.agent_spiffe_mappings
# row must exist for the SPIFFE ID this agent presents.
defaultAgentSpiffe:
  enabled: false
  imageRepository: 'hoophq/hoopdev'
  imageTag: latest
  imagePullPolicy: Always
  # Where the agent connects to the gateway. Defaults to the in-pod
  # gRPC port so this sidecar doesn't egress.
  grpcHost: 127.0.0.1:8010
  grpcSkipVerify: false
  # Cosmetic HOOP_NAME passed to the agent. Identity is resolved from
  # the SPIFFE mapping, not this field, but setting it yields cleaner
  # logs. Leave empty to omit.
  name: ''
  # resources:
  #   limits:
  #     cpu: 512m
  #     memory: 512Mi
  #   requests:
  #     cpu: 128m
  #     memory: 256Mi

  spiffeHelper:
    image: ghcr.io/spiffe/spiffe-helper:0.9.1
    imagePullPolicy: IfNotPresent
    # Unix socket path to the SPIRE Workload API as exposed by the CSI
    # driver. Override only if your CSI driver mounts it elsewhere.
    agentAddress: /spiffe-workload-api/spire-agent.sock
    # Required. Must match config.HOOP_SPIFFE_AUDIENCE on the gateway.
    audience: ''
    # resources:
    #   limits:
    #     cpu: 100m
    #     memory: 64Mi
    #   requests:
    #     cpu: 50m
    #     memory: 32Mi

# -- Ship a static SPIFFE trust bundle (JWKS) as a Kubernetes Secret
# mounted into the gateway at /app/spiffe/bundle.jwks. Set
# config.HOOP_SPIFFE_BUNDLE_FILE to that path when using this.
# Leave empty when the gateway fetches the bundle over HTTPS via
# config.HOOP_SPIFFE_BUNDLE_URL.
# Accepts either raw JWKS JSON (detected by a leading '{') or a
# base64-encoded single-line JWKS, which is friendlier to shell-heredoc
# value substitution pipelines.
spiffeBundle:
  jwks: ''

# -- Enable PostgreSQL
postgres:
  # it default to host mount when enabled
  enabled: false

  # set a storage class name to use a Persistent Volume Claim
  storageClassName: null

  # -- Size of PVC
  size: 10Gi
  # annotations: {}

# -- Enable data masking with Presidio
dataMasking:
  enabled: false

  # Presidio version information: https://github.com/microsoft/presidio/releases
  version: latest

  # best-effort | strict
  mode: best-effort

  analyzer:
    replicas: 1
    imageRepository: mcr.microsoft.com/presidio-analyzer
    imagePullPolicy: Always
    imageTag: latest

    # Presidio WSGI HTTP Server configuration
    gunicornConfigFile: |
      bind = '0.0.0.0:3000'
      workers = 2
      threads = 4
      timeout = 120
      keep_alive = 65
      preload_app = True
      loglevel = 'debug'
      worker_class = 'gthread'

    resources:
      limits:
        cpu: 2200m
        memory: 2048Mi
      requests:
        cpu: 1024m
        memory: 1024Mi

  anonymizer:
    replicas: 1
    imageRepository: mcr.microsoft.com/presidio-anonymizer
    imagePullPolicy: Always
    imageTag: latest

    # Presidio WSGI HTTP Server configuration
    gunicornConfigFile: |
      bind = '0.0.0.0:3000'
      workers = 2
      threads = 4
      timeout = 120
      keep_alive = 65
      preload_app = True
      loglevel = 'debug'
      worker_class = 'gthread'

    resources:
      limits:
        cpu: 2048m
        memory: 1024Mi
      requests:
        cpu: 256m
        memory: 512Mi

  envoyProxy:
    replicas: 1
    imageRepository: envoyproxy/envoy
    imagePullPolicy: Always
    imageTag: v1.33-latest

    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi

## Set pod annotations
##
podAnnotations: {}

## Set deployment annotations
##
deploymentAnnotations: {}

# hoop gateway configuration. Please refer to https://hoop.dev/docs/self-hosting
config:
  POSTGRES_DB_URI: ''
  # API_URL: 'yourdomain.tld'
  IDP_AUDIENCE: null
  IDP_ISSUER: null
  IDP_CLIENT_ID: null
  IDP_CLIENT_SECRET: null
  IDP_CUSTOM_SCOPES: null
  # LOG_ENCODING: 'console|json'
  # LOG_LEVEL: 'debug|info|warn|error'
  # LOG_GRPC: "0|1|2"
  # ASK_AI_CREDENTIALS: ''
  # GOOGLE_APPLICATION_CREDENTIALS_JSON: ''
  # PLUGIN_AUDIT_PATH: ''
  # PLUGIN_INDEX_PATH: ''
  #
  # Async RDP session-replay PII analysis. Workers run OCR + Presidio over
  # recorded RDP bitmap frames so the webapp can highlight PII on top of the
  # replay. Defaults to 0 (disabled). Set RDP_ANALYSIS_WORKERS >= 1 and ensure
  # MSPRESIDIO_ANALYZER_URL is reachable and tesseract is installed in the
  # gateway image to enable.
  # RDP_ANALYSIS_WORKERS: '0'
  # RDP_PII_SNAPSHOT_INTERVAL: '0.25'
  # RDP_PII_SCORE_THRESHOLD: '0.9'
  # RDP_PII_ENTITY_DENYLIST: 'DATE_TIME,NRP'

mainService:
  # -- Annotations to add in the main service
  annotations: {}
    # beta.cloud.google.com/backend-config: '{"ports": {"http": "hoopgateway-http", "grpc": "hoopgateway-grpc"}}'
    # cloud.google.com/app-protocols: '{"http":"HTTPS", "grpc":"HTTP2"}'
  # -- GCP BackendConfig resource
  httpBackendConfig: {}
    # healthCheckType: HTTPS
    # timeoutSec: 30
  # -- GCP BackendConfig resource
  grpcBackendConfig: {}
    # healthCheckType: HTTPS
    # timeoutSec: 259200

ingressApi:
  # -- Enables Ingress
  enabled: false
  ingressClassName: ''
  # -- Ingress annotations (values are templated)
  annotations:
    # kubernetes.io/tls-acme: "true"

  # -- Ingress hostname for API
  # host: hoop.yourdomain.tld
  # -- TLS configuration
  # tls:
  # - hosts:
  #   - api01.domain.tld
  #   - api02.domain.tld


ingressGrpc:
  # -- Enables Ingress
  enabled: false
  ingressClassName: ''
  # -- Ingress annotations (values are templated)
  annotations:
    # kubernetes.io/tls-acme: "true"

  # -- Ingress hostname for gRPC
  # host: hoop.yourdomain.tld
  # -- TLS configuration
  # tls:
  # - hosts:
  #   - grpc01.domain.tld
  #   - grpc02.domain.tld

# --- Expose proxy protocols direct access
proxyService:
  enabled: false
  type: LoadBalancer
  # annotations: {}
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  #   service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  # ports:
  # - name: pgproxy
  #   port: 15432
  #   targetPort: 15432
  #   protocol: TCP
  # - name: sshproxy
  #   port: 12222
  #   targetPort: 12222
  #   protocol: TCP
  # - name: rdpproxy
  #   port: 13389
  #   targetPort: 13389
  #   protocol: TCP

# -- Define persistence to sessions
persistence:
  # -- Use persistent volume for write ahead log sessions
  enabled: false
  storageClassName: null

  # -- Size of persistent volume claim
  size: 10Gi
  # annotations: {}

# -- Deployment strategy
deploymentStrategy:
  type: Recreate

# -- Node labels for pod assignment
nodeSelector: {}

# -- Toleration labels for pod assignment
tolerations: []

# -- Affinity settings for pod assignment
affinity: {}

# -- CPU/Memory resource requests/limits
resources:
  gw:
    limits:
      cpu: 2048m
      memory: 1Gi
    requests:
      cpu: 512m
      memory: 1Gi

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
