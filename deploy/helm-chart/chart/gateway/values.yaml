## Default values for hoop.
## This is a YAML-formatted file.
## Declare variables to be passed into your templates.

# Refer to this guide for more details: https://hoop.dev/docs/setup/deployment/overview

# -- Define a custom image configuration
image:
  gw: {}
  #   repository: hoophq/hoop
  #   pullPolicy: Always
  #   tag: latest

# -- Enable the default agent (authenticates to the gateway via HOOP_KEY / DSN)
defaultAgent:
  enabled: false
  imageRepository: 'hoophq/hoopdev'
  imageTag: latest
  imagePullPolicy: Always
  grpcScheme: grpc
  grpcHost: 127.0.0.1:8010
  # 'base64://<base64-encoded-ca-cert>'
  # 'file:///path/to/ca-cert.pem'
  grpcTlsCa: ''
  grpcSkipVerify: false

# -- Enable PostgreSQL
postgres:
  # it default to host mount when enabled
  enabled: false

  # set a storage class name to use a Persistent Volume Claim
  storageClassName: null

  # -- Size of PVC
  size: 10Gi
  # annotations: {}

# -- Enable data masking with Presidio
dataMasking:
  enabled: false

  # Presidio version information: https://github.com/microsoft/presidio/releases
  version: latest

  # best-effort | strict
  mode: best-effort

  analyzer:
    replicas: 1
    imageRepository: mcr.microsoft.com/presidio-analyzer
    imagePullPolicy: Always
    imageTag: latest

    # Presidio WSGI HTTP Server configuration
    gunicornConfigFile: |
      bind = '0.0.0.0:3000'
      workers = 2
      threads = 4
      timeout = 120
      keep_alive = 65
      preload_app = True
      loglevel = 'debug'
      worker_class = 'gthread'

    resources:
      limits:
        cpu: 2200m
        memory: 2048Mi
      requests:
        cpu: 1024m
        memory: 1024Mi

  anonymizer:
    replicas: 1
    imageRepository: mcr.microsoft.com/presidio-anonymizer
    imagePullPolicy: Always
    imageTag: latest

    # Presidio WSGI HTTP Server configuration
    gunicornConfigFile: |
      bind = '0.0.0.0:3000'
      workers = 2
      threads = 4
      timeout = 120
      keep_alive = 65
      preload_app = True
      loglevel = 'debug'
      worker_class = 'gthread'

    resources:
      limits:
        cpu: 2048m
        memory: 1024Mi
      requests:
        cpu: 256m
        memory: 512Mi

  envoyProxy:
    replicas: 1
    imageRepository: envoyproxy/envoy
    imagePullPolicy: Always
    imageTag: v1.33-latest

    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi

## Set pod annotations
##
podAnnotations: {}

## Set deployment annotations
##
deploymentAnnotations: {}

# -- Pod-level security context for the gateway Pod
# (e.g. fsGroup, runAsNonRoot, runAsUser, seccompProfile)
podSecurityContext: {}

# -- Container-level security context for the gateway and default-agent
# containers (e.g. allowPrivilegeEscalation, capabilities,
# readOnlyRootFilesystem, runAsNonRoot, seccompProfile)
securityContext: {}

# hoop gateway configuration. Please refer to https://hoop.dev/docs/self-hosting
config:
  POSTGRES_DB_URI: ''
  # API_URL: 'yourdomain.tld'
  IDP_AUDIENCE: null
  IDP_ISSUER: null
  IDP_CLIENT_ID: null
  IDP_CLIENT_SECRET: null
  IDP_CUSTOM_SCOPES: null
  # LOG_ENCODING: 'console|json'
  # LOG_LEVEL: 'debug|info|warn|error'
  # LOG_GRPC: "0|1|2"
  # ASK_AI_CREDENTIALS: ''
  # GOOGLE_APPLICATION_CREDENTIALS_JSON: ''
  # PLUGIN_AUDIT_PATH: ''
  # PLUGIN_INDEX_PATH: ''
  #
  # Async RDP session-replay PII analysis. Workers run OCR + Presidio over
  # recorded RDP bitmap frames so the webapp can highlight PII on top of the
  # replay. Defaults to 0 (disabled). Set RDP_ANALYSIS_WORKERS >= 1 and ensure
  # MSPRESIDIO_ANALYZER_URL is reachable and tesseract is installed in the
  # gateway image to enable.
  # RDP_ANALYSIS_WORKERS: '0'
  # RDP_PII_SNAPSHOT_INTERVAL: '0.25'
  # RDP_PII_SCORE_THRESHOLD: '0.9'
  # RDP_PII_ENTITY_DENYLIST: 'DATE_TIME,NRP'

  ## SPIFFE / JWT-SVID authentication
  ## When HOOP_SPIFFE_MODE=enforce, the gateway validates agent JWT-SVIDs
  ## against the SPIFFE trust bundle. Supply the bundle via exactly one of:
  ##   HOOP_SPIFFE_BUNDLE_JWKS (inline — raw JWKS JSON or base64 of it;
  ##                            autodetected by the gateway on the env side),
  ##   HOOP_SPIFFE_BUNDLE_URL  (HTTPS fetch, refreshed on HOOP_SPIFFE_REFRESH_PERIOD),
  ##   HOOP_SPIFFE_BUNDLE_FILE (path mounted into the container).
  # HOOP_SPIFFE_MODE: 'enforce'
  # HOOP_SPIFFE_TRUST_DOMAIN: 'customer.com'
  # HOOP_SPIFFE_AUDIENCE: 'https://hoop.customer.com'
  # HOOP_SPIFFE_REFRESH_PERIOD: '5m'
  # HOOP_SPIFFE_BUNDLE_URL: ''
  # HOOP_SPIFFE_BUNDLE_JWKS: ''

mainService:
  # -- Annotations to add in the main service
  annotations: {}
    # beta.cloud.google.com/backend-config: '{"ports": {"http": "hoopgateway-http", "grpc": "hoopgateway-grpc"}}'
    # cloud.google.com/app-protocols: '{"http":"HTTPS", "grpc":"HTTP2"}'
  # -- GCP BackendConfig resource
  httpBackendConfig: {}
    # healthCheckType: HTTPS
    # timeoutSec: 30
  # -- GCP BackendConfig resource
  grpcBackendConfig: {}
    # healthCheckType: HTTPS
    # timeoutSec: 259200

ingressApi:
  # -- Enables Ingress
  enabled: false
  ingressClassName: ''
  # -- Ingress annotations (values are templated)
  annotations:
    # kubernetes.io/tls-acme: "true"

  # -- Ingress hostname for API
  # host: hoop.yourdomain.tld
  # -- TLS configuration
  # tls:
  # - hosts:
  #   - api01.domain.tld
  #   - api02.domain.tld


ingressGrpc:
  # -- Enables Ingress
  enabled: false
  ingressClassName: ''
  # -- Ingress annotations (values are templated)
  annotations:
    # kubernetes.io/tls-acme: "true"

  # -- Ingress hostname for gRPC
  # host: hoop.yourdomain.tld
  # -- TLS configuration
  # tls:
  # - hosts:
  #   - grpc01.domain.tld
  #   - grpc02.domain.tld

# -- Gateway API resources (gateway.networking.k8s.io/v1)
# Requires the Gateway API CRDs to be installed in your cluster.
# For Istio: install with `istioctl install` or the Istio Helm chart.
# For other implementations: https://gateway-api.sigs.k8s.io/guides/
gatewayApi:
  # -- Enable Gateway API resources (HTTPRoute + optional Gateway)
  enabled: false

  # -- Create a Gateway resource.
  # Set to false to attach the HTTPRoute to a pre-existing Gateway.
  createGateway: true

  # -- Gateway resource configuration
  gateway:
    # -- Gateway resource name (also used as the default parentRef for the HTTPRoute)
    name: hoopgateway
    # -- Annotations to add to the Gateway
    annotations: {}
    # -- GatewayClass name (e.g. istio, nginx, cilium)
    gatewayClassName: istio
    # -- Listeners define the addresses and ports for incoming traffic.
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.Listener
    listeners:
    - name: http
      # -- Restrict the listener to a specific hostname; leave commented to accept all hosts
      # hostname: hoop.yourdomain.org
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

    # -- Requested addresses for the Gateway (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GatewayAddress
    # addresses:
    # - type: IPAddress
    #   value: 1.2.3.4
    # - type: Hostname
    #   value: hoop.yourdomain.org

    # -- Infrastructure-level parameters passed to the underlying Gateway implementation (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GatewayInfrastructure
    # infrastructure:
    #   labels:
    #     environment: production
    #   annotations:
    #     networking.example.com/service-type: Internal
    #   parametersRef:
    #     group: example.com
    #     kind: Config
    #     name: my-config

    # -- Backend TLS configuration applied to all backends via this Gateway (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GatewayBackendTLS
    # backendTLS:
    #   clientCertificateRef:
    #     name: my-client-cert

  # -- HTTPRoute resource configuration
  httpRoute:
    # -- HTTPRoute resource name
    name: hoopgateway-route
    # -- Annotations to add to the HTTPRoute
    annotations: {}
    # -- Hostnames the route applies to; should match listener hostname(s) above
    # hostnames:
    # - hoop.yourdomain.org

    # -- HTTPRoute rules. Specify the full list of match/backendRef/filter rules.
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.HTTPRouteRule
    # rules:
    # - matches:
    #   - path:
    #       type: PathPrefix
    #       value: /protobuf.Transport
    #   backendRefs:
    #   - name: hoopgateway
    #     port: 8010
    # - matches:
    #   - path:
    #       type: PathPrefix
    #       value: /
    #   backendRefs:
    #   - name: hoopgateway
    #     port: 8009

    # -- Parent references for this HTTPRoute (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.ParentReference
    # parentRefs:
    # - name: hoopgateway
    # - name: hoopgateway
    #   namespace: infra
    #   sectionName: http

# -- Gateway API resources for gRPC (gateway.networking.k8s.io/v1)
# Requires the Gateway API CRDs to be installed in your cluster.
# For Istio: install with `istioctl install` or the Istio Helm chart.
# For other implementations: https://gateway-api.sigs.k8s.io/guides/
gatewayApiGrpc:
  # -- Enable Gateway API resources for gRPC (GRPCRoute + optional Gateway)
  enabled: false

  # -- Create a Gateway resource.
  # Set to false to attach the GRPCRoute to a pre-existing Gateway.
  createGateway: true

  # -- Gateway resource configuration
  gateway:
    # -- Gateway resource name (also used as the default parentRef for the GRPCRoute)
    name: hoopgateway-grpc
    # -- Annotations to add to the Gateway
    annotations: {}
    # -- GatewayClass name (e.g. istio, nginx, cilium)
    gatewayClassName: istio
    # -- Listeners define the addresses and ports for incoming gRPC traffic.
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.Listener
    listeners:
    - name: grpc
      # hostname: grpc.yourdomain.org
      port: 8443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Same

    # -- Requested addresses for the Gateway (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GatewayAddress
    # addresses:
    # - type: IPAddress
    #   value: 1.2.3.4
    # - type: Hostname
    #   value: grpc.yourdomain.org

    # -- Infrastructure-level parameters passed to the underlying Gateway implementation (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GatewayInfrastructure
    # infrastructure:
    #   labels:
    #     environment: production
    #   annotations:
    #     networking.example.com/service-type: Internal
    #   parametersRef:
    #     group: example.com
    #     kind: Config
    #     name: my-config

    # -- Backend TLS configuration applied to all backends via this Gateway (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GatewayBackendTLS
    # backendTLS:
    #   clientCertificateRef:
    #     name: my-client-cert

  # -- GRPCRoute resource configuration
  grpcRoute:
    # -- GRPCRoute resource name
    name: hoopgateway-grpc-route
    # -- Annotations to add to the GRPCRoute
    annotations: {}
    # -- Hostnames the route applies to; should match listener hostname(s) above
    # hostnames:
    # - grpc.yourdomain.org

    # -- GRPCRoute rules. Specify the full list of match/backendRef/filter rules.
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.GRPCRouteRule
    # rules:
    # - backendRefs:
    #   - name: hoopgateway
    #     port: 8010

    # -- Parent references for this GRPCRoute (optional).
    # Refer to: https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.ParentReference
    # parentRefs:
    # - name: hoopgateway-grpc
    # - name: hoopgateway-grpc
    #   namespace: infra
    #   sectionName: grpc

# --- Expose proxy protocols direct access
proxyService:
  enabled: false
  type: LoadBalancer
  # annotations: {}
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  #   service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  # ports:
  # - name: pgproxy
  #   port: 15432
  #   targetPort: 15432
  #   protocol: TCP
  # - name: sshproxy
  #   port: 12222
  #   targetPort: 12222
  #   protocol: TCP
  # - name: rdpproxy
  #   port: 13389
  #   targetPort: 13389
  #   protocol: TCP

# -- Define persistence to sessions
persistence:
  # -- Use persistent volume for write ahead log sessions
  enabled: false
  storageClassName: null

  # -- Size of persistent volume claim
  size: 10Gi
  # annotations: {}

# -- Deployment strategy
deploymentStrategy:
  type: Recreate

# -- Node labels for pod assignment
nodeSelector: {}

# -- Toleration labels for pod assignment
tolerations: []

# -- Affinity settings for pod assignment
affinity: {}

# -- CPU/Memory resource requests/limits
resources:
  gw:
    limits:
      cpu: 2048m
      memory: 1Gi
    requests:
      cpu: 512m
      memory: 1Gi

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
