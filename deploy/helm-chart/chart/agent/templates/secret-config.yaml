apiVersion: v1
kind: Secret
metadata:
  name: agent-config
type: Opaque
stringData:
  {{- if .Values.spiffe.enabled }}
  HOOP_SPIFFE_KEY_FILE: '/run/spiffe/agent.jwt'
  HOOP_GRPCURL: '{{ required "spiffe.grpcHost is required when spiffe.enabled=true" .Values.spiffe.grpcHost }}'
  {{- if .Values.spiffe.grpcSkipVerify }}
  HOOP_TLS_SKIP_VERIFY: 'true'
  {{- end }}
  {{- if .Values.spiffe.name }}
  HOOP_SPIFFE_NAME: '{{ .Values.spiffe.name }}'
  {{- end }}
  {{- else }}
  HOOP_KEY: '{{ required "config.HOOP_KEY is required when spiffe.enabled=false" .Values.config.HOOP_KEY }}'
  HOOP_GATEWAY_URL: '{{ .Values.config.HOOP_GATEWAY_URL | default "" }}'
  {{- end }}
  LOG_ENCODING: '{{ .Values.config.LOG_ENCODING | default "json" }}'
  LOG_LEVEL: '{{ .Values.config.LOG_LEVEL | default "info" }}'
  LOG_GRPC: '{{ .Values.config.LOG_GRPC | default "0" }}'
  GODEBUG: 'http2debug={{ .Values.config.LOG_GRPC | default "0" }}'
  HOOP_GATEWAY_URL: '{{ .Values.config.HOOP_GATEWAY_URL | default "" }}'
