apiVersion: v1
kind: Secret
metadata:
  name: agent-config
type: Opaque
stringData:
  HOOP_KEY: '{{ .Values.config.HOOP_KEY | default "" }}'
  HOOP_SPIFFE_KEY_FILE: '/run/spiffe/agent.jwt'
  HOOP_SPIFFE_NAME: '{{ .Values.spiffe.name | default "" }}'
  HOOP_GRPCURL: '{{ .Values.spiffe.grpcHost | default "" }}'
  HOOP_GRPC_INSECURE: '{{ .Values.spiffe.grpcInsecure | default "" }}'
  HOOP_TLS_SKIP_VERIFY: '{{ .Values.spiffe.grpcSkipVerify | default "" }}'
  HOOP_GATEWAY_URL: '{{ .Values.config.HOOP_GATEWAY_URL | default "" }}'
  MSPRESIDIO_ANALYZER_URL: '{{ .Values.config.MSPRESIDIO_ANALYZER_URL | default "" }}'
  MSPRESIDIO_ANONYMIZER_URL: '{{ .Values.config.MSPRESIDIO_ANONYMIZER_URL | default "" }}'
  VAULT_ADDR: '{{ .Values.config.VAULT_ADDR | default "" }}'
  VAULT_TOKEN: '{{ .Values.config.VAULT_TOKEN | default "" }}'
  VAULT_CACERT: '{{ .Values.config.VAULT_CACERT | default "" }}'
  VAULT_APP_ROLE_ID: '{{ .Values.config.VAULT_APP_ROLE_ID | default "" }}'
  VAULT_APP_ROLE_SECRET_ID: '{{ .Values.config.VAULT_APP_ROLE_SECRET_ID | default "" }}'
  VAULT_HTTP_REQ_TIMEOUT: '{{ .Values.config.VAULT_HTTP_REQ_TIMEOUT | default "" }}'
  DLP_MODE: '{{ .Values.config.DLP_MODE | default "" }}'
  LOG_ENCODING: '{{ .Values.config.LOG_ENCODING | default "json" }}'
  LOG_LEVEL: '{{ .Values.config.LOG_LEVEL | default "info" }}'
  LOG_GRPC: '{{ .Values.config.LOG_GRPC | default "0" }}'
  GODEBUG: 'http2debug={{ .Values.config.LOG_GRPC | default "0" }}'
