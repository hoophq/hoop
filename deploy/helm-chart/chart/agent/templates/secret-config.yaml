apiVersion: v1
kind: Secret
metadata:
  name: agent-config
type: Opaque
stringData:
  HOOP_KEY: '{{ .Values.config.HOOP_KEY | default "" }}'
  HOOP_SPIFFE_KEY_FILE: '/run/spiffe/agent.jwt'
  HOOP_SPIFFE_NAME: '{{ .Values.spiffe.name | default "" }}'
  HOOP_GRPCURL: '{{ .Values.spiffe.grpcHost | default "" }}'
  HOOP_GRPC_INSECURE: '{{ .Values.spiffe.grpcInsecure | default "" }}'
  HOOP_TLS_SKIP_VERIFY: '{{ .Values.spiffe.grpcSkipVerify | default "" }}'
  HOOP_GATEWAY_URL: '{{ .Values.config.HOOP_GATEWAY_URL | default "" }}'
  LOG_ENCODING: '{{ .Values.config.LOG_ENCODING | default "json" }}'
  LOG_LEVEL: '{{ .Values.config.LOG_LEVEL | default "info" }}'
  LOG_GRPC: '{{ .Values.config.LOG_GRPC | default "0" }}'
  GODEBUG: 'http2debug={{ .Values.config.LOG_GRPC | default "0" }}'
