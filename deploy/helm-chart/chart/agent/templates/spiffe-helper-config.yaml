{{- if .Values.spiffe.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: hoopagent-spiffe-helper
data:
  helper.conf: |
    agent_address = "{{ .Values.spiffe.spiffeHelper.agentAddress | default "/spiffe-workload-api/spire-agent.sock" }}"
    cmd = ""
    cert_dir = ""
    svid_file_name = ""
    svid_key_file_name = ""
    svid_bundle_file_name = ""
    jwt_svids = [
      {
        jwt_audience       = "{{ required "spiffe.spiffeHelper.audience is required when spiffe.enabled=true" .Values.spiffe.spiffeHelper.audience }}"
        jwt_svid_file_name = "/run/spiffe/agent.jwt"
      }
    ]
{{- end }}
