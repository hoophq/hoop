## Default values for hoop.
## This is a YAML-formatted file.
## Declare variables to be passed into your templates.

# Refer to this guide for more details: https://hoop.dev/docs/setup/deployment/overview

# -- Define a custom image configuration
image: {}
  # repository: hoophq/hoopdev
  # pullPolicy: Always
  # tag: latest

config: {}
  # HOOP_KEY: '<AUTH_KEY>'
  # LOG_ENCODING: 'console|json'
  # LOG_LEVEL: 'debug|info|warn|error'
  # LOG_GRPC: '0|1|2'
  # HOOP_GATEWAY_URL: 'https://gateway.example.com'

# -- Define extra secret as environment variables
extraSecret: {}
# ENVSECRET1: RAWVALUE1
# ENVSECRET2: RAWVALUE2

# -- Deployment strategy
deploymentStrategy:
  type: Recreate

# -- CPU/Memory resource requests/limits
# resources:
#   limits:
#     cpu: 1024m
#     memory: 1Gi
#   requests:
#     cpu: 1024m
#     memory: 1Gi

# -- Node labels for pod assignment
nodeSelector: {}

# -- Toleration labels for pod assignment
tolerations: []

# -- Affinity settings for pod assignment
affinity: {}

## Set pod annotations
##
podAnnotations: {}

## Set deployment annotations
##
deploymentAnnotations: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}

# -- Additional init containers to run before the agent container
additionalInitContainers: []
# - name: init-myservice
#   image: busybox
#   command: ['sh', '-c', 'echo init']

# -- Volume mounts for the agent container
volumeMounts: []
# - name: my-configmap-volume
#   mountPath: /etc/config/myfile.conf
#   subPath: myfile.conf

# -- Volumes to mount into the pod
volumes: []
# - name: my-configmap-volume
#   configMap:
#     name: my-configmap
